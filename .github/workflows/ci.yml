name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint, Audit, Test, Build
    runs-on: ubuntu-latest

    # Service containers for tests that need a real DB / Redis.
    # Unit tests that mock Prisma/Redis ignore these; integration tests use them.
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: starter_test
        ports:
          - 5435:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6380:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    env:
      # Minimal env so the app/tests can boot. Secrets are fake CI values.
      NODE_ENV: test
      APP_ENV: local
      PORT: '8080'
      DATABASE_URL: postgresql://postgres:postgres@localhost:5435/starter_test?schema=public
      REDIS_URL: redis://localhost:6380/0
      JWT_ACCESS_SECRET: ci-access-secret-ci-access-secret-32
      JWT_REFRESH_SECRET: ci-refresh-secret-ci-refresh-secret-32
      JWT_ACCESS_TTL: 15m
      JWT_REFRESH_TTL: 7d
      FRONTEND_URL: http://localhost:3000
      CORS_ORIGINS: http://localhost:3000
      CSRF_ENABLED: 'false'
      SWAGGER_ENABLED: 'false'
      NEW_RELIC_ENABLED: 'false'
      LOG_LEVEL: info
      SMTP_HOST: ${{ vars.SMTP_HOST }}
      SMTP_PORT: ${{ vars.SMTP_PORT }}
      SMTP_USER: ${{ secrets.SMTP_USER }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      MAIL_FROM: ${{ vars.MAIL_FROM }}
      NEW_RELIC_LICENSE_KEY: ${{ secrets.NEW_RELIC_LICENSE_KEY }}
      NEW_RELIC_APP_NAME: ${{ vars.NEW_RELIC_APP_NAME }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: ${{ vars.AWS_REGION }}
      AWS_S3_BUCKET_NAME: ${{ vars.AWS_S3_BUCKET_NAME }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Security Audit
        run: npm audit --audit-level=high

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Run migrations (test DB)
        run: npx prisma migrate deploy

      - name: Test (with coverage)
        run: npm test -- --coverage --ci

      - name: Run E2E Testing Suite
        run: |
          npx prisma migrate deploy
          npx prisma db seed  # Add this line
          npm run test:e2e

      - name: Build
        run: npm run build

      - name: Build Local Production Docker Image
        run: docker compose build --no-cache

      - name: Execute Live Container Smoke Check
        env:
          NEW_RELIC_LICENSE_KEY: ${{ secrets.NEW_RELIC_LICENSE_KEY }}
          NEW_RELIC_APP_NAME: ${{ vars.NEW_RELIC_APP_NAME }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ vars.AWS_REGION }}
          AWS_S3_BUCKET_NAME: ${{ vars.AWS_S3_BUCKET_NAME }}
          SMTP_HOST: ${{ vars.SMTP_HOST }}
          SMTP_PORT: ${{ vars.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          MAIL_FROM: ${{ vars.MAIL_FROM }}
        run: |
          # Create .env from CI env vars so compose can load it
          cat > .env << EOF
          NODE_ENV=production
          APP_ENV=local
          PORT=8080
          DATABASE_URL=${DATABASE_URL}
          REDIS_URL=redis://redis:6379/0
          JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET}
          JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
          JWT_ACCESS_TTL=${JWT_ACCESS_TTL}
          JWT_REFRESH_TTL=${JWT_REFRESH_TTL}
          FRONTEND_URL=${FRONTEND_URL}
          CORS_ORIGINS=${CORS_ORIGINS}
          CSRF_ENABLED=false
          SWAGGER_ENABLED=false
          NEW_RELIC_ENABLED=false
          LOG_LEVEL=info
          EOF

          # Start the application service container in the background
          docker compose up -d

          echo "Awaiting system container initialization..."
          sleep 5

          # Query your real health endpoint path (matching the port mapped in your compose file)
          echo "Querying internal application engine health parameters..."
          RESPONSE_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/health/ready || echo "000")

          if [ "$RESPONSE_CODE" -eq 200 ]; then
            echo "Success: Application successfully booted via Compose environment (HTTP 200)."
            docker compose down
          else
            echo "Critical Error: Container failed initialization smoke check. Received HTTP Status: $RESPONSE_CODE"
            echo "--- Container Operational Run Logs ---"
            docker compose logs
            docker compose down
            exit 1
          fi
